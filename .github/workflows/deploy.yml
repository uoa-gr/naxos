name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-config:
    name: Generate config.js from secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate config.js from repository secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          cat > config.js << 'EOF'
          // Auto-generated by GitHub Actions — do not edit manually
          const SUPABASE_URL = '__SUPABASE_URL__';
          const SUPABASE_ANON_KEY = '__SUPABASE_ANON_KEY__';
          window.DEBUG_MODE = false;

          (function initializeSupabase() {
              if (typeof supabase === 'undefined') {
                  console.warn('Supabase library not loaded. Using local data fallback.');
                  return;
              }
              if (!SUPABASE_URL || SUPABASE_URL === 'YOUR_SUPABASE_URL') {
                  console.warn('Supabase not configured. Using local data fallback.');
                  return;
              }
              try {
                  const { createClient } = supabase;
                  window.supabaseClient = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                  console.log('Supabase client initialized');
              } catch (error) {
                  console.error('Failed to initialize Supabase:', error);
              }
          })();
          EOF
          # Substitute secrets after the heredoc so they don't get expanded by bash unintentionally
          sed -i "s|__SUPABASE_URL__|${SUPABASE_URL}|g" config.js
          sed -i "s|__SUPABASE_ANON_KEY__|${SUPABASE_ANON_KEY}|g" config.js

      - name: Verify config.js generated
        run: |
          test -f config.js && echo "config.js created"
          head -3 config.js | sed 's/eyJ.*/eyJ.../' # don't print the key

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: config
          path: config.js
          retention-days: 1
